<div class="auth-page">

  <!-- Background effects -->
  <div class="auth-bg">
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>
  </div>

  <div class="auth-container">

    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-icon">◇</span>
      <span class="logo-text">NexBank</span>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="card-accent card-accent--register"></div>

      <div class="auth-header">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Open your NexBank account in seconds</p>
      </div>

      <!-- Error -->
      @if (error()) {
        <div class="auth-error visible">
          <span class="error-icon">!</span>
          <span>{{ error() }}</span>
        </div>
      }

      <!-- Form -->
      <div class="auth-form">

        <div class="input-group">
          <label class="input-label" for="name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/></svg>
            <input
              id="name"
              type="text"
              class="input-field"
              placeholder="Alex Morgan"
              [(ngModel)]="name"
              (keydown.enter)="submit()"
            />
          </div>
        </div>

        <div class="input-group">
          <label class="input-label" for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 4L12 13 2 4"/></svg>
            <input
              id="email"
              type="email"
              class="input-field"
              placeholder="you@example.com"
              [(ngModel)]="email"
              (keydown.enter)="submit()"
            />
          </div>
        </div>

        <div class="input-row">
          <div class="input-group">
            <label class="input-label" for="pin">PIN Code</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
              <input
                id="pin"
                [type]="showPin() ? 'text' : 'password'"
                class="input-field"
                placeholder="••••"
                maxlength="4"
                [(ngModel)]="pin"
                (keydown.enter)="submit()"
              />
              <button type="button" class="pin-toggle" (click)="togglePin()">
                {{ showPin() ? 'Hide' : 'Show' }}
              </button>
            </div>
          </div>

          <div class="input-group">
            <label class="input-label" for="confirmPin">Confirm PIN</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 01-.67 0C7.5 20.5 4 18 4 13V6a1 1 0 01.6-.92l7-3.11a1 1 0 01.8 0l7 3.11A1 1 0 0120 6z"/></svg>
              <input
                id="confirmPin"
                [type]="showPin() ? 'text' : 'password'"
                class="input-field"
                placeholder="••••"
                maxlength="4"
                [(ngModel)]="confirmPin"
                (keydown.enter)="submit()"
              />
            </div>
          </div>
        </div>

        <!-- PIN Strength -->
        @if (pin) {
          <div class="pin-strength">
            <div class="strength-bars">
              <div class="strength-bar" [class.active]="pinStrength === 'weak' || pinStrength === 'medium' || pinStrength === 'strong'" [class.weak]="pinStrength === 'weak'" [class.medium]="pinStrength === 'medium'" [class.strong]="pinStrength === 'strong'"></div>
              <div class="strength-bar" [class.active]="pinStrength === 'medium' || pinStrength === 'strong'" [class.medium]="pinStrength === 'medium'" [class.strong]="pinStrength === 'strong'"></div>
              <div class="strength-bar" [class.active]="pinStrength === 'strong'" [class.strong]="pinStrength === 'strong'"></div>
            </div>
            <span class="strength-text" [class.weak]="pinStrength === 'weak'" [class.medium]="pinStrength === 'medium'" [class.strong]="pinStrength === 'strong'">
              {{ pinStrength === 'weak' ? 'Weak' : pinStrength === 'medium' ? 'Fair' : 'Strong' }}
            </span>
          </div>
        }

        <button
          class="auth-btn auth-btn--register"
          (click)="submit()"
          [class.loading]="loading()"
          [disabled]="loading()"
        >
          @if (loading()) {
            <span class="spinner"></span>
            <span>Creating account…</span>
          } @else {
            <span>Create Account</span>
            <span class="btn-arrow">→</span>
          }
        </button>
      </div>

      <!-- Footer -->
      <div class="auth-footer">
        <span class="footer-text">Already have an account?</span>
        <a routerLink="/login" class="footer-link">Sign In</a>
      </div>
    </div>

  </div>
</div>
