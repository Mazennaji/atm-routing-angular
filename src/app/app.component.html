<div class="atm-shell">

  <header class="atm-header">
    <div class="header-left">
      <div class="logo-mark">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">NexBank</span>
      </div>
      <div class="card-info">
        <span class="card-chip">▣</span>
        <span class="card-name">{{ atm.cardName() }}</span>
        <span class="card-num">•••• {{ atm.cardLast4() }}</span>
      </div>
    </div>
    <div class="header-right">
      <app-theme-toggle></app-theme-toggle>
      <div class="balance-pill">
        <span class="balance-label">Balance</span>
        <span class="balance-amount">{{ atm.formatCurrency(atm.balance()) }}</span>
      </div>
      <button class="logout-btn" (click)="auth.logout()" title="Logout">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </header>

  <nav class="atm-nav">
    <a routerLink="/"        routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" class="nav-item">
      <span class="nav-icon">⌂</span> Home
    </a>
    <a routerLink="/balance" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">◎</span> Balance
    </a>
    <a routerLink="/withdraw" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">↑</span> Withdraw
    </a>
    <a routerLink="/deposit" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">↓</span> Deposit
    </a>
    <a routerLink="/receipt" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">≡</span> Receipt
    </a>
    <a routerLink="/history" routerLinkActive="active" class="nav-item">
      <span class="nav-icon">◷</span> History
    </a>
  </nav>

  <main class="atm-main">
    <router-outlet />
  </main>

  <footer class="atm-footer">
    <span>NexBank ATM v2.4.1</span>
    <span class="separator">·</span>
    <span>256-bit AES Encrypted</span>
    <span class="separator">·</span>
    <span>Session active</span>
    <span class="status-dot"></span>
  </footer>

</div>

<div class="bg-grid" aria-hidden="true"></div>
<div class="bg-glow"  aria-hidden="true"></div>
